name: daily-trivia-voicevox

on:
  schedule:
    # ダメ元版。まずは1日1本で様子見。JST 18:11ごろ。
    - cron: "11 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-trivia-voicevox
  cancel-in-progress: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Start VOICEVOX engine (Docker)
        run: |
          # CPU版VOICEVOXエンジンをDockerで起動（runnerにDocker同梱）
          docker run -d --name voicevox -p 50021:50021 voicevox/voicevox_engine:cpu-latest
          echo "VOICEVOXコンテナ起動。Python側でreadyを待ちます。"

      - name: Install system deps (ffmpeg / ImageMagick / fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick fonts-noto-cjk wget
          sudo mkdir -p /usr/share/fonts/truetype/custom
          sudo wget -q -O /usr/share/fonts/truetype/custom/PottaOne-Regular.ttf "https://github.com/google/fonts/raw/main/ofl/pottaone/PottaOne-Regular.ttf"
          sudo wget -q -O /usr/share/fonts/truetype/custom/MochiyPopOne-Regular.ttf "https://github.com/google/fonts/raw/main/ofl/mochiypopone/MochiyPopOne-Regular.ttf"
          sudo fc-cache -f
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"\/>//' /etc/ImageMagick-6/policy.xml || true
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"\/>//' /etc/ImageMagick-7/policy.xml || true

      - name: Install python deps
        run: pip install -r requirements.txt

      - name: Generate and upload (trivia / VOICEVOX)
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          PRIVACY: "unlisted"   # ダメ元なので最初は限定公開で
        run: python generate_trivia_voicevox.py

      - name: Stop VOICEVOX engine
        if: always()
        run: docker rm -f voicevox || true

      - name: Commit dedup log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_log_trivia.json
          git commit -m "update trivia dedup log [skip ci]" || echo "no changes"
          git pull --rebase origin main
          git push
